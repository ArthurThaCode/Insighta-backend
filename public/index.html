<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Insighta Labs Portal</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b7a;
        --line: #d8dee8;
        --accent: #0f766e;
        --danger: #b42318;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 24px auto;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      button,
      input,
      select {
        height: 38px;
        border-radius: 6px;
        border: 1px solid var(--line);
        font: inherit;
      }
      input,
      select {
        min-width: 0;
        padding: 0 10px;
        background: #fff;
      }
      button {
        padding: 0 13px;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      button.danger {
        color: var(--danger);
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 150px 150px 110px auto auto;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
      }
      .create-row {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .create-row input {
        width: min(360px, 100%);
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        font-size: 14px;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        background: #fbfcfe;
      }
      .status {
        color: var(--muted);
        font-size: 14px;
      }
      .hidden {
        display: none;
      }
      .empty {
        padding: 28px;
        color: var(--muted);
      }
      @media (max-width: 820px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }
        table {
          min-width: 760px;
        }
        .panel {
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Insighta Labs</h1>
        <div id="session" class="status">Checking session...</div>
      </div>
      <div>
        <a id="login" href="/auth/github/start?interface=web"><button class="primary">Sign in with GitHub</button></a>
        <button id="logout" class="hidden">Sign out</button>
      </div>
    </header>

    <main id="app" class="hidden">
      <div id="adminTools" class="create-row hidden">
        <input id="newName" placeholder="New profile name" />
        <button id="create" class="primary">Create</button>
      </div>

      <div class="toolbar">
        <input id="q" placeholder="Natural language search" />
        <select id="gender">
          <option value="">Any gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <input id="country" placeholder="Country code" maxlength="2" />
        <select id="limit">
          <option>10</option>
          <option>20</option>
          <option>50</option>
        </select>
        <button id="search">Search</button>
        <button id="export">Export CSV</button>
      </div>

      <div class="panel">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Gender</th>
              <th>Age</th>
              <th>Group</th>
              <th>Country</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty hidden">No profiles found.</div>
      </div>
      <p id="meta" class="status"></p>
    </main>

    <script>
      const state = { user: null, page: 1 };
      const csrf = () =>
        document.cookie
          .split("; ")
          .find((part) => part.startsWith("insighta_csrf="))
          ?.split("=")[1] || "";

      async function api(path, options = {}, retry = true) {
        const response = await fetch(path, {
          credentials: "include",
          headers: {
            Accept: "application/json",
            ...(options.body ? { "Content-Type": "application/json", "X-CSRF-Token": csrf() } : {}),
            ...(options.headers || {}),
          },
          ...options,
        });
        if (response.status === 401 && retry) {
          const refreshed = await fetch("/auth/refresh", { method: "POST", credentials: "include" }).catch(() => null);
          if (refreshed && refreshed.ok) return api(path, options, false);
        }
        if (!response.ok) {
          const error = await response.json().catch(() => ({ message: "Request failed" }));
          throw new Error(error.message);
        }
        if (response.status === 204) return null;
        return response.json();
      }

      async function loadSession() {
        try {
          const data = await api("/api/v1/session/me");
          state.user = data.data.user;
          document.getElementById("session").textContent = `${state.user.login} (${state.user.role})`;
          document.getElementById("login").classList.add("hidden");
          document.getElementById("logout").classList.remove("hidden");
          document.getElementById("app").classList.remove("hidden");
          if (state.user.role === "admin") document.getElementById("adminTools").classList.remove("hidden");
          await loadProfiles();
        } catch {
          document.getElementById("session").textContent = "Not signed in";
          document.getElementById("login").classList.remove("hidden");
        }
      }

      async function loadProfiles() {
        const q = document.getElementById("q").value.trim();
        const params = new URLSearchParams({ page: state.page, limit: document.getElementById("limit").value });
        const gender = document.getElementById("gender").value;
        const country = document.getElementById("country").value.trim().toUpperCase();
        if (gender) params.set("gender", gender);
        if (country) params.set("country_id", country);
        const url = q
          ? `/api/v1/profiles/search?q=${encodeURIComponent(q)}&${params.toString()}`
          : `/api/v1/profiles?${params.toString()}`;
        const data = await api(url);
        renderRows(data.data, data.pagination);
      }

      function renderRows(rows, pagination) {
        const tbody = document.getElementById("rows");
        tbody.innerHTML = "";
        document.getElementById("empty").classList.toggle("hidden", rows.length > 0);
        for (const row of rows) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.name}</td>
            <td>${row.gender}</td>
            <td>${row.age}</td>
            <td>${row.age_group}</td>
            <td>${row.country_id || ""}</td>
            <td>${new Date(row.created_at).toLocaleString()}</td>
            <td>${state.user.role === "admin" ? `<button class="danger" data-id="${row.id}">Delete</button>` : ""}</td>
          `;
          tbody.appendChild(tr);
        }
        document.getElementById("meta").textContent = `Page ${pagination.page} of ${
          pagination.total_pages || 1
        } - ${pagination.total} total`;
      }

      document.getElementById("search").addEventListener("click", () => {
        state.page = 1;
        loadProfiles().catch((error) => alert(error.message));
      });

      document.getElementById("create").addEventListener("click", async () => {
        const name = document.getElementById("newName").value.trim();
        if (!name) return;
        await api("/api/v1/profiles", { method: "POST", body: JSON.stringify({ name }) });
        document.getElementById("newName").value = "";
        await loadProfiles();
      });

      document.getElementById("rows").addEventListener("click", async (event) => {
        const id = event.target.dataset.id;
        if (!id) return;
        await api(`/api/v1/profiles/${id}`, { method: "DELETE", body: "{}" });
        await loadProfiles();
      });

      document.getElementById("export").addEventListener("click", () => {
        window.location.href = "/api/v1/profiles/export";
      });

      document.getElementById("logout").addEventListener("click", async () => {
        await fetch("/auth/logout", { method: "POST", credentials: "include", headers: { "X-CSRF-Token": csrf() } });
        location.href = "/portal";
      });

      loadSession();
    </script>
  </body>
</html>
